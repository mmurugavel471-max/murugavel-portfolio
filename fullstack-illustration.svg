<svg viewBox="0 0 600 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Full-stack development illustration showing frontend, backend, and database layers">
  <defs>
    <linearGradient id="skyfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF5FE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="600" height="460" fill="url(#skyfade)" rx="16"/>

  <!-- floating code brackets -->
  <text x="60" y="90" font-family="IBM Plex Mono, monospace" font-size="46" fill="#2E9BF0" opacity="0.35">&lt;/&gt;</text>
  <text x="480" y="130" font-family="IBM Plex Mono, monospace" font-size="34" fill="#2E9BF0" opacity="0.25">{ }</text>
  <text x="40" y="380" font-family="IBM Plex Mono, monospace" font-size="30" fill="#2E9BF0" opacity="0.22">[ ]</text>

  <!-- === Browser / Frontend layer === -->
  <g>
    <rect x="150" y="60" width="300" height="170" rx="10" fill="#FFFFFF" stroke="#0B0F14" stroke-width="2"/>
    <rect x="150" y="60" width="300" height="28" rx="10" fill="#0B0F14"/>
    <rect x="150" y="78" width="300" height="10" fill="#0B0F14"/>
    <circle cx="168" cy="74" r="5" fill="#2E9BF0"/>
    <circle cx="186" cy="74" r="5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="204" cy="74" r="5" fill="#FFFFFF" opacity="0.6"/>

    <rect x="170" y="104" width="140" height="14" rx="3" fill="#D7E7F6"/>
    <rect x="170" y="128" width="220" height="10" rx="3" fill="#EAF5FE"/>
    <rect x="170" y="146" width="180" height="10" rx="3" fill="#EAF5FE"/>
    <rect x="170" y="170" width="90" height="28" rx="6" fill="#2E9BF0"/>
    <text x="185" y="188" font-family="Poppins, sans-serif" font-size="12" fill="#FFFFFF" font-weight="600">Frontend</text>
  </g>

  <!-- connecting line to server -->
  <line x1="300" y1="230" x2="300" y2="270" stroke="#0B0F14" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- === Server / Backend layer === -->
  <g>
    <rect x="120" y="270" width="150" height="90" rx="8" fill="#0B0F14"/>
    <rect x="138" y="286" width="114" height="10" rx="2" fill="#2E9BF0"/>
    <rect x="138" y="304" width="90" height="8" rx="2" fill="#5B6B7A"/>
    <rect x="138" y="320" width="100" height="8" rx="2" fill="#5B6B7A"/>
    <circle cx="248" cy="340" r="6" fill="#2E9BF0"/>
    <text x="138" y="352" font-family="Poppins, sans-serif" font-size="12" fill="#FFFFFF" font-weight="600">Backend / API</text>
  </g>

  <!-- === Database layer === -->
  <g>
    <ellipse cx="405" cy="278" rx="70" ry="16" fill="#2E9BF0"/>
    <rect x="335" y="278" width="140" height="60" fill="#2E9BF0"/>
    <ellipse cx="405" cy="338" rx="70" ry="16" fill="#1C82D6"/>
    <ellipse cx="405" cy="298" rx="70" ry="14" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="405" cy="318" rx="70" ry="14" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
    <text x="368" y="284" font-family="Poppins, sans-serif" font-size="12" fill="#0B0F14" font-weight="600">Database</text>
  </g>

  <!-- connecting line backend to db -->
  <line x1="270" y1="310" x2="335" y2="308" stroke="#0B0F14" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- base platform -->
  <rect x="70" y="400" width="460" height="14" rx="7" fill="#0B0F14"/>
  <text x="220" y="440" font-family="Poppins, sans-serif" font-size="16" fill="#0B0F14" font-weight="600">Full-Stack Development</text>
</svg>
